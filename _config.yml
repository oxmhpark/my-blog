# 운영자 정보
author: "옥수박"

# 웹사이트 정보
title: "NEMORIUM.NET"
description: ""
lang: "ko"
timezone: "Asia/Seoul"
stylesheet_url: "/assets/style.css"
favicon_url: "/assets/CIN_TIGHT@NEMORIUM.NET.png"

# 주소체계
url: "https://nemorium.net"
enforce_ssl: "https://nemorium.net"
baseurl: "/"
permalink: ":slug"
format:
  date: "%Y.%m.%d."
  year: "%Y"

# HTML/CSS 파서
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
sass:
  style: :expanded

# 아카이브 정의
collections:
  archive_projects:
    output: true
    path: _archive_projects
    permalink: "project/:slug"
  archive_events:
    output: true
    path: _archive_events
    permalink: "event/:slug"
  archive_years:
    output: true
    path: _archive_years
    permalink: "year/:slug"
  entry_pages:
    output: _entry_pages
    path: _entry_pages
    permalink: ":slug"
  entry_posts:
    output: _entry_posts
    path: _entry_posts
    permalink: ":slug"

# 아카이브 프로퍼티
defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
    values:
      meta:
        - refs
        - queries
        - author
        - date
        - lastmod
        - years
        - projects
        - events
  -
    scope:
      path: "_archive_projects"
    values:
      layout: archive-project
      meta:
        - refs
        - queries
        - years
        - projects
        - events
  -
    scope:
      path: "_archive_events"
    values:
      layout: archive-event
      meta:
        - refs
        - queries
        - years
        - projects
        - events
  -
    scope:
      path: "_archive_years"
    values:
      layout: archive-year
      meta: nil
  -
    scope:
      path: "_entry_pages"
    values:
      layout: entry-page
      meta: nil
  -
    scope:
      path: "_entry_posts"
    values:
      layout: entry-post
      meta:
        - refs
        - queries
        - date
        - lastmod
        - years
        - projects
        - events
        - links

# 빌드 타겟
exclude:
  - README.md
  - blog.code-workspace
  - _config.yml.sample
  - .gitattributes
  - .gitignore
  - .hintrc
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CNAME
  - _archive_projects/__TEMPLATE__.md
  - _archive_events/__TEMPLATE__.md
  - _archive_years/__TEMPLATE__.md
  - _entry_pages/__TEMPLATE__.md
  - _entry_posts/__TEMPLATE__.md

# 플러그인
#plugins:
#  - jekyll-sitemap
#  - jekyll-feed
#  - jekyll-seo-tag
